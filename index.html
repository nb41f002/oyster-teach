<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>教學提詞台 · 葉容辰（公會長）</title>
<style>
:root{--navy:#12374B;--ocean:#0F4C4A;--tan:#FBF3E7;--gold:#B9862E;--oyst:#C4632B;--bamboo:#3F7A4E;
 --ink:#1B2A33;--line:#D9C9AE;--bg:#F3EEE3;--card:#fff;--muted:#6b7a80;
 --zh:#243A44;--en:#0B5E6E;--cue:#B0561F;--stu:#2E6B8C;--cmd:#0B5E6E;--fz:1;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:"PingFang TC","Noto Sans CJK TC","Microsoft JhengHei",system-ui,sans-serif}
body.dark{--bg:#0c1a20;--card:#132630;--tan:#16303a;--ink:#eaf1f2;--zh:#dfeaec;--line:#2c4650;--muted:#8fa6ad}
.wrap{max-width:860px;margin:0 auto;padding:0 14px 130px}
header{position:sticky;top:0;z-index:30;background:var(--navy);color:#fff;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.hin{max-width:860px;margin:0 auto}
.brand{font-size:.7rem;letter-spacing:.12em;color:#CDE4E9;opacity:.9}
.htitle{font-size:1.14rem;font-weight:800;margin-top:2px}
.htitle small{font-weight:500;opacity:.82;font-size:.84rem;margin-left:6px}
.sub{display:inline-block;margin-top:6px;font-size:.72rem;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.25);padding:2px 9px;border-radius:999px}
.chips{display:flex;gap:7px;overflow-x:auto;padding:10px 0 2px;-webkit-overflow-scrolling:touch}
.chip{flex:0 0 auto;background:var(--card);border:1.5px solid var(--line);border-radius:999px;padding:6px 12px;font-size:.78rem;font-weight:700;cursor:pointer;color:var(--ink);white-space:nowrap}
.chip.on{border-color:var(--oyst);background:var(--oyst);color:#fff}
.chip.t-on{border-color:var(--bamboo);background:var(--bamboo);color:#fff}
.ctrl{margin:10px 0 0}
.segrow{display:flex;gap:8px;flex-wrap:wrap}
.seg{display:flex;flex:1;min-width:186px;background:var(--card);border:1.5px solid var(--line);border-radius:12px;overflow:hidden}
.seg b{flex:1;text-align:center;padding:8px 4px;font-size:.82rem;font-weight:800;cursor:pointer;color:var(--muted);white-space:nowrap}
.seg b small{display:block;font-weight:600;font-size:.6rem;opacity:.75;margin-top:1px}
.seg b.on{background:var(--oyst);color:#fff}
.seg b.on small{opacity:.9}
#segClass b.on{background:var(--bamboo)}
.tsel{width:100%;margin-top:8px;padding:10px 12px;font-size:.92rem;font-weight:700;border:1.5px solid var(--line);border-radius:12px;background:var(--card);color:var(--ink);font-family:inherit;appearance:none;-webkit-appearance:none;background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);background-position:calc(100% - 20px) 55%,calc(100% - 14px) 55%;background-size:6px 6px;background-repeat:no-repeat}
.days{display:flex;gap:8px;overflow-x:auto;padding:8px 0 6px;position:sticky;z-index:25;background:var(--bg);top:0}
.day{flex:0 0 auto;min-width:104px;background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:8px 11px;cursor:pointer;color:var(--ink)}
.day.on{border-color:var(--oyst);box-shadow:0 3px 0 var(--oyst)}
.day .dn{font-size:.62rem;color:var(--muted)} .day .dt{font-weight:800;font-size:.86rem;margin-top:1px}
.day.storm{border-style:dashed;border-color:#c0564f}
.day.storm .dt{color:#c0564f}
.day.storm.on{border-color:#c0564f;box-shadow:0 3px 0 #c0564f}
.storm-banner{background:#fdf1ef;border:1.5px dashed #c0564f;border-radius:14px;padding:11px 14px;margin:12px 0;color:#7a2d28;font-size:.86rem;line-height:1.6}
body.dark .storm-banner{background:#3a2422;color:#f0c0ba;border-color:#a05048}
.storm-banner b{display:block;font-size:.95rem;margin-bottom:4px}
.cnote{background:#fff6e8;border:1px solid var(--gold);border-radius:12px;padding:9px 12px;margin:8px 0;font-size:.88rem;line-height:1.6;color:#7a5511}
body.dark .cnote{background:#33301f;color:#e7c88a}
.pdiv{text-align:center;font-size:.74rem;font-weight:800;color:var(--muted);margin:14px 0 6px;letter-spacing:.08em}
.bar{display:flex;align-items:center;gap:8px;margin:8px 0 4px;flex-wrap:wrap}
.prog{flex:1;height:8px;background:var(--line);border-radius:99px;overflow:hidden;min-width:110px}
.prog>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--bamboo),var(--gold));transition:width .3s}
.btn{border:1.5px solid var(--line);background:var(--card);color:var(--ink);border-radius:10px;padding:6px 11px;font-size:.78rem;font-weight:700;cursor:pointer}
.cnt{font-size:.72rem;color:var(--muted)}
.card{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--oyst);border-radius:14px;margin:12px 0;overflow:hidden}
.card.mine{border-left-color:var(--navy);box-shadow:0 0 0 2px rgba(18,55,75,.10)}
.card.dim{opacity:.42}
.chead{display:flex;align-items:center;gap:9px;padding:11px 13px;cursor:pointer;flex-wrap:wrap}
.slotno{font-size:.66rem;font-weight:800;background:var(--oyst);color:#fff;padding:3px 8px;border-radius:8px;white-space:nowrap}
.card.mine .slotno{background:var(--navy)}
.ctitle{font-weight:800;font-size:.98rem;flex:1;min-width:180px}
.ctitle small{display:block;font-weight:600;color:var(--muted);font-size:.72rem;margin-top:2px}
.tbadge{font-size:.7rem;font-weight:800;background:var(--tan);border:1px solid var(--gold);color:#7a5511;padding:3px 9px;border-radius:999px;white-space:nowrap}
body.dark .tbadge{color:#e7c88a}
.tbadge.hit{background:var(--bamboo);border-color:var(--bamboo);color:#fff}
.chk{width:26px;height:26px;border-radius:8px;border:2px solid var(--line);display:grid;place-items:center;font-size:.9rem;color:transparent;flex:0 0 auto}
.chk.done{background:var(--bamboo);border-color:var(--bamboo);color:#fff}
.caret{color:var(--muted);font-size:.85rem;transition:transform .2s}
.card.open .caret{transform:rotate(90deg)}
.cbody{display:none;padding:0 13px 13px}
.card.open .cbody{display:block}
.sec{margin:10px 0 4px;font-size:.8rem;font-weight:800;color:var(--navy);border-left:4px solid var(--gold);padding-left:8px}
body.dark .sec{color:#e7c88a}
.sd{background:var(--tan);border:1px solid var(--line);border-radius:12px;padding:9px 12px;margin:6px 0}
.sd .g{margin:3px 0;font-size:.9rem;line-height:1.5}
.sd .flow{margin:3px 0;font-size:.92rem;line-height:1.6}
.sd .lh{margin:4px 0;font-size:.86rem;line-height:1.5}
.sd .lh b{font-weight:800}
.sd .lh.hl{background:rgba(63,122,78,.12);border-radius:6px;padding:2px 6px}
.sd .nt{margin-top:5px;font-size:.8rem;color:var(--cue)}
.dnote{margin:8px 0;font-size:.8rem;color:#a33;background:#fdeeee;border:1px solid #eebbbb;border-radius:10px;padding:7px 10px}
body.dark .dnote{background:#3a2020;border-color:#7a4040;color:#f0b0b0}
.ln{display:flex;gap:8px;margin:7px 0;align-items:flex-start;line-height:1.55}
.tag{flex:0 0 auto;font-size:.6rem;font-weight:800;padding:2px 6px;border-radius:6px;margin-top:3px;min-width:26px;text-align:center}
.t-zh{background:#e7edf0;color:#4a5b62}.t-en{background:#d6efe6;color:#0b5e6e}
.t-cue{background:#f6e3d6;color:#b0561f}.t-stu{background:#dbeaf3;color:#2e6b8c}
.x{font-size:calc(1rem*var(--fz))}
.ln.zh .x{color:var(--zh);font-size:calc(1.03rem*var(--fz))}
.ln.en .x{color:var(--en);font-weight:800;font-size:calc(1.14rem*var(--fz))}
.ln.cue .x{color:var(--cue);font-size:calc(.9rem*var(--fz))}
.ln.stu .x{color:var(--stu);font-weight:700;font-size:calc(1.03rem*var(--fz))}
.ln.cmd .x{color:var(--cmd);font-weight:800;font-size:calc(1.08rem*var(--fz))}
.ln.note .x{color:var(--muted);font-size:calc(.8rem*var(--fz));font-style:italic}
.act{border:1px solid var(--line);border-radius:12px;padding:9px 12px;margin:9px 0}
.act.star{border-color:var(--navy);box-shadow:0 0 0 2px rgba(18,55,75,.10)}
.ahead{display:flex;gap:8px;align-items:center;margin-bottom:4px;flex-wrap:wrap}
.atime{font-size:.62rem;font-weight:800;background:var(--tan);border:1px solid var(--line);padding:2px 7px;border-radius:7px;color:#7a5511}
body.dark .atime{color:#e7c88a}
.atitle{font-weight:800;font-size:.94rem}
.starb{font-size:.56rem;background:#fde9c9;color:#8a5a12;border:1px solid var(--gold);padding:1px 6px;border-radius:6px}
.steps{background:var(--tan);border:1px solid var(--line);border-radius:12px;padding:2px 12px 9px;margin-top:6px}
.steph{font-weight:800;font-size:.86rem;color:var(--navy);margin:10px 0 3px}
body.dark .steph{color:#e7c88a}
.actimgs{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 2px}
.actimgs img{width:31.5%;border-radius:8px;border:1px solid var(--line);cursor:zoom-in}
.pg{border:1px solid var(--line);border-radius:12px;padding:9px 12px;margin:10px 0;background:var(--card)}
.pg.grp{background:var(--tan)}
.pgh{display:flex;align-items:center;gap:8px;font-weight:800;font-size:.92rem;margin-bottom:5px}
.pno{font-size:.62rem;font-weight:800;background:var(--navy);color:#fff;padding:2px 8px;border-radius:7px}
.pgimg{width:100%;border-radius:9px;border:1px solid var(--line);cursor:zoom-in;margin:2px 0 7px;display:block}
.grpimgs{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin:2px 0 7px}
.grpimgs img{width:100%;border-radius:7px;border:1px solid var(--line);cursor:zoom-in;aspect-ratio:16/9;object-fit:cover}
.gal{margin:6px 0 2px}
.galdeck{font-size:.76rem;font-weight:800;color:var(--muted);margin:8px 0 4px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.grid img{width:100%;border-radius:8px;border:1px solid var(--line);cursor:zoom-in;aspect-ratio:16/9;object-fit:cover;background:#ddd}
.fab{position:fixed;right:16px;bottom:calc(18px + env(safe-area-inset-bottom));z-index:40;background:var(--navy);color:#fff;border:none;border-radius:16px;padding:13px 16px;font-weight:800;font-size:.9rem;box-shadow:0 6px 18px rgba(0,0,0,.28);cursor:pointer}
.fab.top{bottom:calc(86px + env(safe-area-inset-bottom));padding:12px 14px;background:var(--oyst);display:none}
.fab.top.show{display:block}
.ov{position:fixed;inset:0;z-index:50;background:rgba(8,18,22,.82);display:none;align-items:center;justify-content:center;padding:18px}
.ov.on{display:flex}
.ovbox{background:var(--card);border-radius:18px;max-width:520px;width:100%;padding:16px;max-height:90vh;overflow:auto}
.ovbox h3{margin:2px 0 10px;color:var(--navy)} body.dark .ovbox h3{color:#e7c88a}
.cmdrow{display:flex;align-items:center;gap:10px;background:var(--tan);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin:8px 0}
.cmdrow .call{font-weight:800;font-size:1.02rem;color:var(--navy)} body.dark .cmdrow .call{color:#dfeaec}
.cmdrow .arr{color:var(--oyst);font-weight:800}
.cmdrow .resp{font-weight:800;font-size:1.12rem;color:var(--oyst)}
.cmdrow .act2{margin-left:auto;font-size:.7rem;color:var(--muted)}
.close{float:right;border:none;background:var(--line);border-radius:10px;padding:5px 11px;font-weight:800;cursor:pointer;color:#4a3a1a}
.lb{position:fixed;inset:0;z-index:60;background:rgba(0,0,0,.93);display:none;align-items:center;justify-content:center;padding:10px}
.lb.on{display:flex} .lb img{max-width:100%;max-height:94vh;border-radius:8px}
.hint{font-size:.72rem;color:var(--muted);text-align:center;margin:14px 0}
footer{text-align:center;color:var(--muted);font-size:.7rem;margin-top:20px}
</style>
</head>
<body>
<header><div class="hin">
 <div class="brand">臺南小蚵人說書辦桌雙語營</div>
 <div class="htitle" id="htitle"></div>
 <span class="sub" id="hsub"></span>
</div></header>

<div class="wrap">
 <div class="ctrl" id="ctrlAll" style="display:none">
  <div class="segrow">
   <div class="seg" id="segWeek"></div>
   <div class="seg" id="segClass"></div>
  </div>
  <select class="tsel" id="teacherSel"></select>
 </div>
 <div class="days" id="days"></div>
 <div class="bar">
  <button class="btn" id="expand">全部展開</button>
  <button class="btn" id="dark">🌙 暗色/大字</button>
  <div class="prog"><i id="pbar"></i></div><span class="cnt" id="cnt"></span>
 </div>
 <div id="list"></div>
 <p class="hint">點卡片標題展開／收合 · 每頁下方就是該頁台詞 · 點圖可放大 · 右下「四大口令」隨時速查</p>
 <footer id="foot"></footer>
</div>

<button class="fab top" id="topBtn" title="回到最上面">⬆︎ 回頂</button>
<button class="fab" id="fab">📣 四大口令</button>
<div class="ov" id="ov"><div class="ovbox">
 <button class="close" onclick="document.getElementById('ov').classList.remove('on')">關閉</button>
 <h3>四大課室呼喚（老師喊 → 勇者回）</h3>
 <div class="cmdrow"><span class="call">Little Oysters!</span><span class="arr">→</span><span class="resp">Listen!</span><span class="act2">捧耳·安靜</span></div>
 <div class="cmdrow"><span class="call">Green Chopsticks!</span><span class="arr">→</span><span class="resp">Go!</span><span class="act2">舉拳·出發</span></div>
 <div class="cmdrow"><span class="call">Golden Spoon!</span><span class="arr">→</span><span class="resp">Freeze!</span><span class="act2">抱胸·靜止</span></div>
 <div class="cmdrow"><span class="call">Save the table!</span><span class="arr">→</span><span class="resp">Now!</span><span class="act2">收桌·坐正</span></div>
 <p class="hint" style="margin-bottom:2px">忘詞先喊 <b>Little Oysters!</b> 把全班拉回來。</p>
</div></div>
<div class="lb" id="lb" onclick="this.classList.remove('on')"><img id="lbimg" src="" alt=""></div>

<script src="data.js"></script>
<script>
const D=DATA, IMG=D.img;
const $=s=>document.querySelector(s);
const TAG={zh:"中",en:"英",cue:"動",stu:"生"};
const MODE=D.mode;
let st={track:'longgang_low', teacher:'', day:1};
const LSKEY = MODE==='all' ? 'oysterPrepDone' : 'oysterTeachDoneV2';
let done={}; try{done=JSON.parse(localStorage.getItem(LSKEY)||'{}')}catch(e){}
const save=()=>{try{localStorage.setItem(LSKEY,JSON.stringify(done))}catch(e){}};

function lineHTML(bl){
 const tag=(bl.t==='cmd'||bl.t==='note')?'':`<span class="tag t-${bl.t}">${TAG[bl.t]}</span>`;
 return `<div class="ln ${bl.t}">${tag}<span class="x">${bl.x}</span></div>`;
}
function actHTML(a){
 let h=`<div class="act${a.star?' star':''}"><div class="ahead"><span class="atime">${a.time}</span><span class="atitle">${a.title}</span>${a.star?'<span class="starb">★ 重點</span>':''}</div>`;
 if(a.imgs&&a.imgs.length){h+='<div class="actimgs">'+a.imgs.map(k=>`<img loading="lazy" src="${IMG[k]}" alt="">`).join('')+'</div>';}
 h+=a.blocks.map(lineHTML).join('');
 if(a.steps){h+='<div class="steps">'+a.steps.map(s=>`<div class="steph">${s.h}</div>`+s.rows.map(lineHTML).join('')).join('')+'</div>';}
 return h+'</div>';
}
function flowHTML(lk, part, isLow){
 const L=D.lessons[lk]; const F=L.flow; if(!F) return null;
 let entries;
 if(F["1"]) entries=F[String(part)]||[];
 else { const v=(isLow?F.low:F.high)||F.high||F.low; entries=(v&&v[String(part)])||[]; }
 if(!entries.length) return null;
 let n=0;
 return '<div class="sec">🎬 逐頁提詞（照簡報順序：每頁＝這頁要講的話）</div>'+entries.map(e=>{
  if(e.img){n++;return `<div class="pg"><div class="pgh"><span class="pno">P${n}</span>${e.h}</div><img class="pgimg" loading="lazy" src="${IMG[e.img]}" alt="">`+e.L.map(lineHTML).join('')+`</div>`;}
  return `<div class="pg grp"><div class="pgh">📦 ${e.group}</div><div class="grpimgs">`+e.imgs.map(k=>`<img loading="lazy" src="${IMG[k]}" alt="">`).join('')+`</div>`+e.L.map(lineHTML).join('')+`</div>`;
 }).join('');
}
function galleryHTML(lk){
 const L=D.lessons[lk]; if(!L.decks.length) return '';
 let h='<div class="sec">🖼 完整簡報逐頁（點圖放大）</div><div class="gal">';
 for(const dk of L.decks){
  const m=D.manifest[dk];
  h+=`<div class="galdeck">${m.label} · 共 ${m.n} 頁</div><div class="grid">`+
     m.pages.map(k=>`<img loading="lazy" src="${IMG[k]}" alt="">`).join('')+'</div>';
 }
 return h+'</div>';
}
function sdHTML(slot, isLow){
 const s=D.sd[slot]; if(!s) return '';
 let h='<div class="sec">🎯 本節目標與流程</div><div class="sd">';
 h+=s.goals.map(g=>`<div class="g">・${g}</div>`).join('');
 h+='<div style="height:5px"></div>';
 h+=s.activities.map((a,i)=>`<div class="flow">${i+1}. ${a}</div>`).join('');
 const hlLow = MODE==='all' ? isLow===true : false;
 const hlHigh = MODE==='all' ? isLow===false : false;
 h+=`<div class="lh${hlLow?' hl':''}"><b>🐚 鮮蚵團(中低)</b>：${s.low}</div>`;
 h+=`<div class="lh${hlHigh?' hl':''}"><b>🎋 竹筍團(高)</b>：${s.high}</div>`;
 if(s.note) h+=`<div class="nt">${s.note}</div>`;
 return h+'</div>';
}
function slotCard(slot, opts){
 const [lk,part]=D.slotLesson[slot];
 const L=D.lessons[lk];
 const p=slot.split('-')[1];
 const theme=D.themes[slot]||L.title;
 const teacher=opts.teacher;
 const mine = MODE==='personal' || (teacher===D.me);
 const dim = (MODE==='all' && st.teacher && teacher!==st.teacher);
 const hit = (MODE==='all' && st.teacher && teacher===st.teacher);
 const id=(MODE==='all'?st.track+':':'p:')+slot;
 const acts=(L.acts||[]).filter(a=>a.part===part);
 let body='';
 if(L.deck_note) body+=`<div class="dnote">${L.deck_note}</div>`;
 body+=sdHTML(slot, opts.isLow);
 const fh=flowHTML(lk, part, opts.isLow);
 if(fh){
   body+=`<div class="sec" style="border-left-color:var(--oyst)">📖 ${L.title}（第${part===1?'一':'二'}節）<span style="font-weight:600;color:var(--muted);font-size:.72rem"> 設計：${L.designer}</span></div>`;
   body+=fh;
 } else if(acts.length){
   body+=`<div class="sec">🎙 逐字稿・${L.title}（第${part===1?'一':'二'}節）<span style="font-weight:600;color:var(--muted);font-size:.72rem"> 設計：${L.designer}</span></div>`;
   body+=acts.map(actHTML).join('');
 }
 return `<div class="card${mine?' mine':''}${dim?' dim':''}" data-id="${id}">
  <div class="chead"><span class="slotno">節${p} ${D.times[p-1]}</span>
   <span class="ctitle">${theme}<small>${L.title} · ${L.en}</small></span>
   <span class="tbadge${hit?' hit':''}">授課：${teacher}</span>
   <span class="caret">▶</span><div class="chk ${done[id]?'done':''}" data-chk="${id}">✓</div></div>
  <div class="cbody">${body}</div></div>`;
}

function render(){
 const dayName=(D.tc[String(st.day)]||[])[1]||'';
 if(MODE==='all'){
  $('#htitle').innerHTML=`全員備課練習台 <small>All-Teachers Prep Station</small>`;
  $('#hsub').textContent='📍 '+D.labels[st.track]+'　·　Day '+st.day+(dayName?' · '+dayName:'');
 }else{
  $('#htitle').innerHTML=`葉容辰 · 教學提詞台 <small>Day ${st.day}${dayName?' · '+dayName:''}</small>`;
  $('#hsub').textContent='🛡️ 你的角色：公會長 Guild Master　·　龍崗週＋保西週皆適用';
 }
 $('#days').innerHTML=[1,2,3,4,5].map(n=>{
   const nm=(D.tc[String(n)]||[])[1]||'';
   return `<div class="day${n===st.day?' on':''}" data-day="${n}"><div class="dn">Day ${n}</div><div class="dt">${nm||('第'+n+'天')}</div></div>`;
 }).join('')+`<div class="day storm${st.day==='C'?' on':''}" data-day="C"><div class="dn">7/9（四）</div><div class="dt">🌀 颱風備案</div></div>`;
 if(st.day==='C'){ renderCont(); return; }
 const isLow=st.track.endsWith('_low');
 let slots;
 if(MODE==='all'){
   slots=[1,2,3,4,5,6].map(p=>`${st.day}-${p}`);
 }else{
   slots=D.mySlots.filter(k=>k.startsWith(st.day+'-')).sort((a,b)=>+a.split('-')[1]-+b.split('-')[1]);
 }
 $('#list').innerHTML=slots.map(sl=>{
   const teacher = MODE==='all' ? (D.assign[st.track][sl]||'—') : D.me;
   return slotCard(sl,{teacher,isLow});
 }).join('') || '<p class="hint">今天沒有你授課的節次。</p>';
 const f=$('#list .card'); if(f) f.classList.add('open');
 allOpen=false; $('#expand').textContent='全部展開';
 updateProg();
}
function contCard(s, isLow){
 const teacher = MODE==='personal' ? D.me : (isLow ? s.low : s.high);
 const dim = (MODE==='all' && st.teacher && teacher!==st.teacher);
 const hit = (MODE==='all' && st.teacher && teacher===st.teacher);
 const L=D.lessons[s.lesson];
 const id='C:'+(MODE==='all'?st.track+':':'p:')+s.p;
 let body=`<div class="cnote">⏱ 濃縮要點：${s.note}</div>`;
 if(L.deck_note) body+=`<div class="dnote">${L.deck_note}</div>`;
 for(const part of s.parts){
   body+=`<div class="pdiv">── 原第${part===1?'一':'二'}節內容 ──</div>`;
   const fh=flowHTML(s.lesson, part, isLow);
   if(fh) body+=fh;
   else body+=((L.acts||[]).filter(a=>a.part===part)).map(actHTML).join('');
 }
 return `<div class="card${MODE==='personal'||teacher===D.me?' mine':''}${dim?' dim':''}" data-id="${id}">
  <div class="chead"><span class="slotno">節${s.p} ${D.times[s.p-1]}</span>
   <span class="ctitle">${s.theme}<small>${L.title} · ${L.en}</small></span>
   <span class="tbadge${hit?' hit':''}">授課：${teacher}</span>
   <span class="caret">▶</span><div class="chk ${done[id]?'done':''}" data-chk="${id}">✓</div></div>
  <div class="cbody">${body}</div></div>`;
}
function renderCont(){
 const C=D.cont;
 if(MODE==='all'){
   $('#htitle').innerHTML=`全員備課練習台 <small>🌀 颱風備案</small>`;
   $('#hsub').textContent='🌀 '+C.title;
 }else{
   $('#htitle').innerHTML=`葉容辰 · 教學提詞台 <small>🌀 颱風備案</small>`;
   $('#hsub').textContent='🌀 '+C.title;
 }
 const isLow = MODE==='all' ? st.track.endsWith('_low') : false;
 let slots=C.slots;
 if(MODE==='personal') slots=slots.filter(s=>s.high===D.me);
 const banner=`<div class="storm-banner"><b>${C.scope}</b>`+C.notes.map(n=>'・'+n).join('<br>')+`</div>`;
 $('#list').innerHTML=banner+slots.map(s=>contCard(s,isLow)).join('');
 const f=$('#list .card'); if(f) f.classList.add('open');
 allOpen=false; $('#expand').textContent='全部展開';
 updateProg();
}
function updateProg(){
 const cards=[...document.querySelectorAll('#list .card')];
 const tot=cards.length||1;
 const dn=cards.filter(c=>done[c.dataset.id]).length;
 $('#pbar').style.width=(dn/tot*100)+'%';
 $('#cnt').textContent=`${dn} / ${cards.length} 完成`;
}

if(MODE==='all'){
 $('#ctrlAll').style.display='block';
 const weeks=[['longgang','龍崗週','7/6 – 7/10'],['baoshi','保西週','8/17 – 8/21']];
 const cls=[['low','🐚 中低年級班'],['high','🎋 高年級班']];
 const segW=$('#segWeek'), segC=$('#segClass');
 segW.innerHTML=weeks.map(w=>`<b data-w="${w[0]}" class="${st.track.startsWith(w[0])?'on':''}">${w[1]}<small>${w[2]}</small></b>`).join('');
 segC.innerHTML=cls.map(c=>`<b data-c="${c[0]}" class="${st.track.endsWith(c[0])?'on':''}">${c[1]}</b>`).join('');
 const setTrack=()=>{st.track=segW.querySelector('.on').dataset.w+'_'+segC.querySelector('.on').dataset.c;render();};
 segW.addEventListener('click',e=>{const b=e.target.closest('[data-w]');if(!b)return;
   [...segW.children].forEach(x=>x.classList.toggle('on',x===b));setTrack();});
 segC.addEventListener('click',e=>{const b=e.target.closest('[data-c]');if(!b)return;
   [...segC.children].forEach(x=>x.classList.toggle('on',x===b));setTrack();});
 const sel=$('#teacherSel');
 sel.innerHTML='<option value="">👥 全部老師（可選一位只看其節次）</option>'+D.teachers.map(t=>`<option value="${t}">${t}${D.roles[t]?'・'+D.roles[t]:''}</option>`).join('');
 sel.addEventListener('change',()=>{st.teacher=sel.value;render();});
}
/* 吸頂 Day 列：貼齊 header 下緣 */
const _hd=document.querySelector('header'), _days=$('#days');
const setSticky=()=>{_days.style.top=(_hd.offsetHeight-1)+'px';};
setSticky(); window.addEventListener('resize',setSticky);
/* 回頂按鈕 */
const topBtn=$('#topBtn');
window.addEventListener('scroll',()=>{topBtn.classList.toggle('show',window.scrollY>500);},{passive:true});
topBtn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
$('#days').addEventListener('click',e=>{const c=e.target.closest('[data-day]');if(!c)return;
 st.day = c.dataset.day==='C' ? 'C' : +c.dataset.day;
 window.scrollTo({top:0,behavior:'smooth'});render();});
$('#list').addEventListener('click',e=>{
 const chk=e.target.closest('[data-chk]');
 if(chk){e.stopPropagation();const id=chk.dataset.chk;done[id]=!done[id];if(!done[id])delete done[id];
   chk.classList.toggle('done');save();updateProg();return;}
 const img=e.target.closest('img');
 if(img&&img.src){e.stopPropagation();$('#lbimg').src=img.src;$('#lb').classList.add('on');return;}
 const head=e.target.closest('.chead');
 if(head){head.closest('.card').classList.toggle('open');}
});
let allOpen=false;
$('#expand').addEventListener('click',()=>{allOpen=!allOpen;
 document.querySelectorAll('#list .card').forEach(c=>c.classList.toggle('open',allOpen));
 $('#expand').textContent=allOpen?'全部收合':'全部展開';});
$('#dark').addEventListener('click',()=>{document.body.classList.toggle('dark');
 document.documentElement.style.setProperty('--fz',document.body.classList.contains('dark')?'1.12':'1');});
$('#fab').addEventListener('click',()=>$('#ov').classList.add('on'));
$('#ov').addEventListener('click',e=>{if(e.target.id==='ov')$('#ov').classList.remove('on');});
$('#foot').textContent = MODE==='all'
 ? '全員備課用（SD 目標流程・逐字稿・完整簡報頁）· 課表資料源：teacher.html'
 : '教師個人提詞台（非學生教材）· 五日逐字稿＋全頁簡報';
render();
</script>
</body>
</html>
